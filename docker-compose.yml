version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: f1-postgres
    environment:
      POSTGRES_DB: f1_predictor
      POSTGRES_USER: f1_app
      POSTGRES_PASSWORD: f1_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1_app -d f1_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: f1-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: f1_predictor
      DB_USER: f1_app
      DB_PASSWORD: f1_secret_password
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: f1-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      - server

volumes:
  postgres_data:
